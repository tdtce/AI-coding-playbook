<div class="w-100 pa3">
  <div class="cta-banner">
    <p class="cta-banner__title">Нужна помощь с внедрением?</p>
    <a href="https://aihubteam.ru/" class="cta-banner__button">Поможем внедрить ИИ-инструменты в вашей команде →</a>
  </div>
</div>
<footer class="{{ .Site.Params.background_color_class | default "bg-black" }} bottom-0 w-100 pa3" role="contentinfo">
  <div class="flex justify-between">
    <a class="f4 fw4 dim no-underline black-50 dn dib-ns pv2 ph3" href="https://aihubteam.ru/">
      &copy; {{ now.Format "2006" }} {{ with .Site.Copyright | default .Site.Title }}{{ . }}{{ end }}
    </a>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
// Search
(function() {
  var input = document.getElementById('search-input');
  var resultsEl = document.getElementById('search-results');
  if (!input || !resultsEl) return;

  var fuse = null;

  fetch('/index.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      fuse = new Fuse(data, {
        keys: [
          { name: 'title', weight: 0.6 },
          { name: 'content', weight: 0.4 }
        ],
        threshold: 0.5,
        ignoreLocation: true,
        includeMatches: true
      });
    });

  input.addEventListener('input', function() {
    var query = this.value.trim();
    if (!query || !fuse) {
      resultsEl.style.display = 'none';
      return;
    }
    var results = fuse.search(query, { limit: 6 });
    if (!results.length) {
      resultsEl.innerHTML = '<div class="site-search__empty">Ничего не найдено</div>';
      resultsEl.style.display = 'block';
      return;
    }
    resultsEl.innerHTML = results.map(function(r) {
      var snippet = '';
      var idx = r.item.content.toLowerCase().indexOf(query.toLowerCase());
      if (idx >= 0) {
        var start = Math.max(0, idx - 50);
        var end = Math.min(r.item.content.length, idx + query.length + 50);
        var before = r.item.content.substring(start, idx).replace(/</g, '&lt;');
        var match = r.item.content.substring(idx, idx + query.length).replace(/</g, '&lt;');
        var after = r.item.content.substring(idx + query.length, end).replace(/</g, '&lt;');
        snippet = (start > 0 ? '...' : '') + before + '<b>' + match + '</b>' + after + (end < r.item.content.length ? '...' : '');
      } else {
        snippet = r.item.content.substring(0, 120).replace(/</g, '&lt;') + '...';
      }
      return '<a href="' + r.item.url + '" class="site-search__item">'
        + '<div class="site-search__item-top">'
        + '<span class="site-search__item-title">' + r.item.title + '</span>'
        + '<span class="site-search__item-section">' + r.item.section + '</span>'
        + '</div>'
        + '<div class="site-search__item-snippet">' + snippet + '</div>'
        + '</a>';
    }).join('');
    resultsEl.style.display = 'block';
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.site-search')) {
      resultsEl.style.display = 'none';
    }
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      resultsEl.style.display = 'none';
      input.blur();
    }
  });
})();

// Callouts
document.querySelectorAll('blockquote').forEach(function(bq) {
  var strong = bq.querySelector('p:first-child > strong:first-child');
  if (!strong) return;
  var text = strong.textContent.trim().replace(/:$/, '');
  var map = {
    'Важно': 'warning', 'Внимание': 'warning',
    'Совет': 'tip', 'Tip': 'tip',
    'Примечание': 'note', 'Note': 'note'
  };
  var type = map[text];
  if (type) bq.classList.add('callout', 'callout--' + type);
});
</script>
